<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dhivakar B — AI & Data Science</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --blue:#1E6FFF;
    --blue-light:#4D96FF;
    --blue-dark:#0A4DD4;
    --blue-pale:#EBF2FF;
    --text:#0D1B3E;
    --text-muted:#5A6A8A;
    --bg:#F7F9FF;
    --glass:rgba(255,255,255,0.72);
    --glass-border:rgba(30,111,255,0.14);
    --shadow:0 8px 40px rgba(30,111,255,0.10);
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background 0.4s,color 0.4s;}
  body.dark{
    --bg:#080E1F;
    --glass:rgba(12,20,44,0.82);
    --glass-border:rgba(77,150,255,0.18);
    --text:#E8EEFF;
    --text-muted:#8899BB;
    --blue-pale:#0D1B3E;
    --shadow:0 8px 40px rgba(30,111,255,0.18);
  }
  h1,h2,h3,h4{font-family:'Syne',sans-serif;}
  html{scroll-behavior:smooth;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--blue-light);border-radius:99px;}
  .glass{
    background:var(--glass);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
    border-radius:20px;
    box-shadow:var(--shadow);
  }
  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:#fff;padding:12px 28px;border-radius:50px;
    font-family:'Syne',sans-serif;font-weight:600;font-size:15px;
    cursor:pointer;border:none;
    box-shadow:0 6px 24px rgba(30,111,255,0.35);
    transition:all 0.3s;text-decoration:none;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(30,111,255,0.45);}
  .btn-outline{
    display:inline-flex;align-items:center;gap:8px;
    background:transparent;
    color:var(--blue);padding:11px 28px;border-radius:50px;
    font-family:'Syne',sans-serif;font-weight:600;font-size:15px;
    cursor:pointer;border:2px solid var(--blue);
    transition:all 0.3s;text-decoration:none;
  }
  .btn-outline:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
  .section-label{
    display:inline-block;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;color:var(--blue);
    background:var(--blue-pale);padding:6px 16px;border-radius:50px;margin-bottom:16px;
  }
  .section-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.1;margin-bottom:16px;}
  .section-sub{color:var(--text-muted);font-size:17px;max-width:540px;line-height:1.7;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:0.7;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
  @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
  .anim-fadeup{animation:fadeUp 0.7s ease both;}
  .anim-fadein{animation:fadeIn 0.8s ease both;}
  #canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .loader{
    position:fixed;inset:0;z-index:9999;
    background:linear-gradient(135deg,#0A1628,#0D1B3E);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    transition:opacity 0.5s,visibility 0.5s;
  }
  .loader.hidden{opacity:0;visibility:hidden;}
  .loader-logo{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:#fff;letter-spacing:-2px;}
  .loader-logo span{color:var(--blue);}
  .loader-bar{width:180px;height:3px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;}
  .loader-progress{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-light));border-radius:99px;animation:shimmer 1.5s linear infinite;background-size:200% auto;}

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:0 clamp(16px,5vw,60px);height:70px;
    display:flex;align-items:center;justify-content:space-between;
    transition:all 0.4s;
  }
  nav.scrolled{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-border);box-shadow:0 4px 30px rgba(30,111,255,0.08);}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text);text-decoration:none;letter-spacing:-0.5px;}
  .nav-logo span{color:var(--blue);}
  .nav-links{display:flex;align-items:center;gap:32px;}
  .nav-links a{font-size:14px;font-weight:500;color:var(--text-muted);text-decoration:none;transition:color 0.2s;position:relative;}
  .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--blue);border-radius:1px;transform:scaleX(0);transition:transform 0.2s;}
  .nav-links a:hover{color:var(--blue);}
  .nav-links a:hover::after{transform:scaleX(1);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;border:1.5px solid var(--glass-border);
    background:var(--glass);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.3s;text-decoration:none;color:var(--text);
  }
  .icon-btn:hover{border-color:var(--blue);color:var(--blue);box-shadow:0 0 16px rgba(30,111,255,0.25);}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
  .hamburger span{width:24px;height:2px;background:var(--text);border-radius:1px;transition:all 0.3s;}
  @media(max-width:768px){
    .nav-links,.nav-right .btn-primary{display:none;}
    .hamburger{display:flex;}
    .mobile-menu{
      position:fixed;top:70px;left:0;right:0;bottom:0;z-index:99;
      background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
      transform:translateX(100%);transition:transform 0.4s;
    }
    .mobile-menu.open{transform:translateX(0);}
    .mobile-menu a{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);text-decoration:none;}
    .mobile-icons{display:flex;gap:16px;}
  }

  /* HERO */
  #home{
    min-height:100vh;display:flex;align-items:center;
    padding:0 clamp(16px,5vw,60px);position:relative;overflow:hidden;
  }
  .hero-bg{
    position:absolute;inset:0;
    background:radial-gradient(ellipse 80% 60% at 60% 40%, rgba(30,111,255,0.12) 0%, transparent 70%),
               radial-gradient(ellipse 50% 50% at 20% 80%, rgba(77,150,255,0.08) 0%, transparent 60%);
  }
  .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;width:100%;max-width:1200px;margin:0 auto;position:relative;z-index:1;}
  @media(max-width:768px){.hero-grid{grid-template-columns:1fr;padding-top:90px;}}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-border);padding:8px 16px;border-radius:50px;font-size:13px;color:var(--blue);font-weight:500;margin-bottom:24px;animation:fadeUp 0.6s ease both;}
  .hero-badge::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 2s ease infinite;}
  .hero-name{font-size:clamp(40px,6vw,72px);font-weight:800;line-height:1.0;letter-spacing:-2px;margin-bottom:12px;animation:fadeUp 0.7s 0.1s ease both;}
  .hero-name .highlight{
    background:linear-gradient(135deg,var(--blue),var(--blue-light));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .hero-role{font-size:clamp(16px,2.5vw,22px);color:var(--text-muted);font-weight:300;margin-bottom:16px;animation:fadeUp 0.7s 0.2s ease both;}
  .hero-tagline{font-size:clamp(14px,2vw,17px);color:var(--text-muted);line-height:1.7;margin-bottom:36px;max-width:480px;animation:fadeUp 0.7s 0.3s ease both;}
  .hero-tagline em{color:var(--blue);font-style:normal;font-weight:500;}
  .hero-btns{display:flex;gap:16px;flex-wrap:wrap;animation:fadeUp 0.7s 0.4s ease both;}
  .hero-socials{display:flex;gap:12px;margin-top:32px;animation:fadeUp 0.7s 0.5s ease both;}
  .hero-3d{position:relative;height:420px;animation:fadeIn 1s 0.3s ease both;}
  @media(max-width:768px){.hero-3d{height:260px;}}

  /* ABOUT */
  #about{padding:100px clamp(16px,5vw,60px);}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;max-width:1200px;margin:0 auto;}
  @media(max-width:768px){.about-grid{grid-template-columns:1fr;}}
  .about-card{padding:40px;position:relative;overflow:hidden;}
  .about-card::before{
    content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
    background:radial-gradient(circle,rgba(30,111,255,0.15),transparent 70%);
    border-radius:50%;
  }
  .about-stats{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px;}
  .stat{text-align:center;padding:20px;background:var(--blue-pale);border-radius:16px;}
  .stat-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--blue);}
  .stat-label{font-size:13px;color:var(--text-muted);margin-top:4px;}

  /* SKILLS */
  #skills{padding:100px clamp(16px,5vw,60px);background:linear-gradient(180deg,transparent,rgba(30,111,255,0.04),transparent);}
  .skills-wrap{max-width:1200px;margin:0 auto;}
  .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;margin-top:48px;}
  .skill-card{
    padding:28px 20px;text-align:center;cursor:default;
    transition:all 0.3s;border-radius:20px;
    background:var(--glass);border:1px solid var(--glass-border);
  }
  .skill-card:hover{transform:translateY(-6px);border-color:var(--blue);box-shadow:0 12px 40px rgba(30,111,255,0.18);}
  .skill-icon{font-size:32px;margin-bottom:12px;display:block;}
  .skill-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);}
  .skill-cat{font-size:12px;color:var(--text-muted);margin-top:4px;}
  .progress-section{margin-top:60px;}
  .progress-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:32px;}
  .progress-item{margin-bottom:24px;}
  .progress-header{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;font-weight:500;}
  .progress-bar{height:8px;background:var(--blue-pale);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--blue-light));transition:width 1.5s ease;width:0;}
  .progress-fill.animated{width:var(--target);}

  /* EDUCATION */
  #education{padding:100px clamp(16px,5vw,60px);}
  .edu-wrap{max-width:800px;margin:0 auto;}
  .edu-timeline{margin-top:48px;position:relative;}
  .edu-timeline::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--blue),transparent);}
  .edu-item{display:flex;gap:32px;margin-bottom:40px;position:relative;}
  .edu-dot{
    width:56px;height:56px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    display:flex;align-items:center;justify-content:center;font-size:22px;
    box-shadow:0 4px 20px rgba(30,111,255,0.35);z-index:1;
  }
  .edu-content{flex:1;padding:28px;border-radius:16px;background:var(--glass);border:1px solid var(--glass-border);transition:all 0.3s;}
  .edu-content:hover{transform:translateX(6px);border-color:var(--blue);}
  .edu-degree{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
  .edu-school{color:var(--blue);font-weight:500;font-size:15px;margin-bottom:8px;}
  .edu-meta{display:flex;gap:16px;flex-wrap:wrap;}
  .edu-tag{font-size:12px;padding:4px 12px;border-radius:99px;background:var(--blue-pale);color:var(--blue);font-weight:600;}

  /* PROJECTS */
  #projects{padding:100px clamp(16px,5vw,60px);background:linear-gradient(180deg,transparent,rgba(30,111,255,0.04),transparent);}
  .proj-wrap{max-width:1200px;margin:0 auto;}
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:28px;margin-top:48px;}
  @media(max-width:480px){.proj-grid{grid-template-columns:1fr;}}
  .proj-card{padding:36px;border-radius:24px;background:var(--glass);border:1px solid var(--glass-border);transition:all 0.35s;position:relative;overflow:hidden;}
  .proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue-light));transform:scaleX(0);transform-origin:left;transition:transform 0.35s;}
  .proj-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(30,111,255,0.18);border-color:var(--blue);}
  .proj-card:hover::before{transform:scaleX(1);}
  .proj-emoji{font-size:40px;margin-bottom:20px;display:block;}
  .proj-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:12px;}
  .proj-desc{color:var(--text-muted);line-height:1.7;font-size:15px;margin-bottom:20px;}
  .proj-tags{display:flex;gap:8px;flex-wrap:wrap;}
  .proj-tag{font-size:12px;padding:5px 12px;border-radius:50px;background:var(--blue-pale);color:var(--blue);font-weight:600;}

  /* ACHIEVEMENTS */
  #achievements{padding:100px clamp(16px,5vw,60px);}
  .ach-wrap{max-width:1000px;margin:0 auto;}
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-top:48px;}
  .ach-card{padding:32px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-border);transition:all 0.3s;display:flex;gap:20px;align-items:flex-start;}
  .ach-card:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 12px 40px rgba(30,111,255,0.15);}
  .ach-icon{font-size:32px;flex-shrink:0;}
  .ach-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
  .ach-sub{font-size:14px;color:var(--text-muted);}

  /* CONTACT */
  #contact{padding:100px clamp(16px,5vw,60px);}
  .contact-wrap{max-width:1000px;margin:0 auto;}
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:48px;}
  @media(max-width:768px){.contact-grid{grid-template-columns:1fr;}}
  .contact-info{display:flex;flex-direction:column;gap:20px;}
  .contact-item{display:flex;gap:16px;align-items:center;padding:20px 24px;border-radius:16px;background:var(--glass);border:1px solid var(--glass-border);transition:all 0.3s;}
  .contact-item:hover{border-color:var(--blue);transform:translateX(4px);}
  .contact-ico{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .contact-label{font-size:12px;color:var(--text-muted);margin-bottom:2px;}
  .contact-val{font-size:15px;font-weight:500;color:var(--text);text-decoration:none;}
  .contact-val:hover{color:var(--blue);}
  .contact-form{display:flex;flex-direction:column;gap:16px;}
  .form-input{
    width:100%;padding:14px 18px;border-radius:14px;
    border:1.5px solid var(--glass-border);background:var(--glass);
    font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);
    outline:none;transition:border-color 0.3s;
    backdrop-filter:blur(8px);
  }
  .form-input:focus{border-color:var(--blue);}
  .form-input::placeholder{color:var(--text-muted);}
  textarea.form-input{resize:vertical;min-height:130px;}

  /* FOOTER */
  footer{
    padding:40px clamp(16px,5vw,60px);
    border-top:1px solid var(--glass-border);
    display:flex;flex-direction:column;align-items:center;gap:20px;
    background:var(--glass);backdrop-filter:blur(12px);
  }
  .footer-icons{display:flex;gap:16px;}
  .footer-text{font-size:14px;color:var(--text-muted);}

  /* Scroll indicator */
  .scroll-dot{
    position:fixed;bottom:32px;right:32px;z-index:50;
    width:44px;height:44px;border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 20px rgba(30,111,255,0.4);
    transition:all 0.3s;opacity:0;pointer-events:none;
  }
  .scroll-dot.visible{opacity:1;pointer-events:auto;}
  .scroll-dot:hover{transform:scale(1.1);}

  /* Section observer */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.7s ease,transform 0.7s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-logo">D<span>.</span></div>
  <div class="loader-bar"><div class="loader-progress" id="loaderBar"></div></div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Three.js floating spheres ───────────────────────── */
function ThreeScene() {
  const mountRef = useRef(null);
  useEffect(() => {
    const el = mountRef.current;
    if (!el) return;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, el.clientWidth / el.clientHeight, 0.1, 100);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(el.clientWidth, el.clientHeight);
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    const geo = new THREE.SphereGeometry(1, 64, 64);
    const createMat = (color, opacity) => new THREE.MeshPhongMaterial({ color, transparent: true, opacity, wireframe: false });

    const spheres = [
      { mesh: new THREE.Mesh(geo, createMat(0x1E6FFF, 0.65)), pos: [0, 0, 0], scale: 1.4, speed: 0.008 },
      { mesh: new THREE.Mesh(geo, createMat(0x4D96FF, 0.45)), pos: [2.2, 1.2, -1], scale: 0.8, speed: 0.012 },
      { mesh: new THREE.Mesh(geo, createMat(0x0A4DD4, 0.55)), pos: [-1.8, -1.0, -0.5], scale: 0.6, speed: 0.009 },
      { mesh: new THREE.Mesh(geo, createMat(0x80B5FF, 0.35)), pos: [1.5, -1.8, 0.3], scale: 0.5, speed: 0.015 },
    ];

    const wireGeo = new THREE.SphereGeometry(1.7, 24, 24);
    const wireMat = new THREE.MeshBasicMaterial({ color: 0x4D96FF, wireframe: true, opacity: 0.15, transparent: true });
    const wireSphere = new THREE.Mesh(wireGeo, wireMat);
    scene.add(wireSphere);

    spheres.forEach(({ mesh, pos, scale }) => {
      mesh.position.set(...pos);
      mesh.scale.setScalar(scale);
      scene.add(mesh);
    });

    const light1 = new THREE.PointLight(0x4D96FF, 3, 10);
    light1.position.set(3, 3, 3);
    const light2 = new THREE.AmbientLight(0x1E6FFF, 0.8);
    const light3 = new THREE.PointLight(0xffffff, 1.5, 8);
    light3.position.set(-2, -2, 2);
    scene.add(light1, light2, light3);

    let frame;
    let mouse = { x: 0, y: 0 };
    const handleMouse = e => {
      const rect = el.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
      mouse.y = -((e.clientY - rect.top) / rect.height - 0.5) * 2;
    };
    el.addEventListener('mousemove', handleMouse);

    const clock = new THREE.Clock();
    const animate = () => {
      frame = requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      wireSphere.rotation.y = t * 0.3;
      wireSphere.rotation.x = t * 0.15;
      spheres.forEach(({ mesh, pos, speed }, i) => {
        mesh.position.y = pos[1] + Math.sin(t * speed * 60 * 0.05 + i) * 0.3;
        mesh.rotation.y += speed;
      });
      camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.05;
      camera.position.y += (mouse.y * 0.3 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);
      renderer.render(scene, camera);
    };
    animate();

    const resize = () => {
      if (!el) return;
      camera.aspect = el.clientWidth / el.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(el.clientWidth, el.clientHeight);
    };
    window.addEventListener('resize', resize);

    return () => {
      cancelAnimationFrame(frame);
      window.removeEventListener('resize', resize);
      el.removeEventListener('mousemove', handleMouse);
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, []);
  return <div ref={mountRef} style={{ width: '100%', height: '100%' }} />;
}

/* ── Progress Bar ───────────────────────────────────── */
function ProgressBar({ label, pct }) {
  const ref = useRef(null);
  const [animated, setAnimated] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setAnimated(true); }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div className="progress-item" ref={ref}>
      <div className="progress-header"><span>{label}</span><span style={{ color: 'var(--blue)' }}>{pct}%</span></div>
      <div className="progress-bar">
        <div className="progress-fill" style={{ '--target': `${pct}%`, width: animated ? `${pct}%` : '0%' }} />
      </div>
    </div>
  );
}

/* ── Reveal wrapper ─────────────────────────────────── */
function Reveal({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { e.target.style.transitionDelay = `${delay}s`; e.target.classList.add('visible'); }
    }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return <div className="reveal" ref={ref} style={style}>{children}</div>;
}

let prog = 0;
const bar = document.getElementById('loaderBar');
const timer = setInterval(() => {
  prog += Math.random() * 18;
  if (prog >= 100) { prog = 100; clearInterval(timer); setTimeout(() => { document.getElementById('loader').classList.add('hidden'); }, 300); }
  if (bar) bar.style.width = prog + '%';
}, 120);
</script>
</body>
</html>
